<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特殊素材の作成方法 加工｜宮真倉リフォーム</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/material.css">
</head>

<body data-page="11">

    <div id="header"></div>

    <main>

        <section class="material-main">
            <div class="container">

                <div class="material-header">
                    <p class="material-label">宮真倉リフォームのひみつ</p>

                    <h1>特殊素材の作成方法 加工！</h1>

                    <p>
                        合成された建材は、専用設備で加工され、
                        住まいに使いやすい形へ整えられます。
                    </p>
                </div>

                <div class="material-steps">

                    <div class="material-step">
                        <span>1</span>
                        <p>調達</p>
                    </div>

                    <div class="material-step">
                        <span>2</span>
                        <p>分離</p>
                    </div>

                    <div class="material-step">
                        <span>3</span>
                        <p>合成</p>
                    </div>

                    <div class="material-step active">
                        <span>4</span>
                        <p>加工</p>
                    </div>

                </div>

                <article class="material-card">

                    <p class="material-count">STEP 4</p>

                    <h2>加工</h2>

                    <figure class="material-figure">
                        <img src="images/material_04.jpg" alt="合成した素材を加工するイラスト">
                        <figcaption>
                            </figcaption>
                    </figure>

                    <p>
                        合成した特殊素材は、専用の設備を使って加工されます。
                    </p>

                    <p>
                        木材や鉄筋に合わせて形を整え、
                        みなさんのおうちに使いやすい建材へ仕上げていきます。
                    </p>

                    <p>
                        一本一本を丁寧に確認しながら加工することで、
                        安心して長く使える素材になります。
                    </p>

                    <p>
                        こうして完成した建材は、
                        みなさんのおうちへ届けられます！
                    </p>

                    <p class="material-staff">
                        ここまでご覧いただきありがとうございました！<br>加工部の高橋和美がお知らせしました！
                    </p>

                </article>

            </div>
        </section>

    </main>

    <div id="footer"></div>

    <script src="include.js"></script>
    <script src="search.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大内頼子の独白</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark.css">
</head>

<body class="dark-page" data-page="23">

    <div id="header"></div>

    <main>

        <section class="dark-main">
            <div class="container">

                <article class="dark-card monologue">

                    <span class="dark-label">
                        個人記録
                    </span>

                    <h1>大内頼子の独白</h1>

                    <p class="dark-date">
                        作成日時：不明
                    </p>

                    <div class="monologue-body">

                        <p>
                            娘は、壊れてしまった。
                        </p>

                        <p>
                            あの事故で雄二さんと、
                            有希ちゃんを亡くしてから。
                        </p>

                        <p>
                            毎日、有希ちゃんの名前を呼び、
                            空っぽになった部屋で話しかけるようになった。
                        </p>

                        <p>
                            そしてそんな娘の様子を見て、
                            私たちも壊れてしまった。
                        </p>

                        <p>
                            あんなおぞましい事に
                            手を染めてしまうなんて。
                        </p>

                        <p>
                            何度も説得した。
                        </p>

                        <p>
                            警察へ行こうともした。
                        </p>

                        <p>
                            けれど、
                            どうしてもできなかった……。
                        </p>

                        <p>
                            娘だから。
                        </p>

                        <p>
                            間違っている。
                        </p>

                        <p>
                            それでも……
                            どうしても、
                            娘を見捨てることだけはできなかった。
                        </p>

                    </div>

                </article>

            </div>
        </section>

    </main>

    <div id="footer"></div>

    <script src="include.js"></script>
    <script src="search.js"></script>

</body>
</html>

                <div class="material-header">

                    <h1>特殊素材の作成方法 合成！</h1>

                    <p>
                        特殊素材は、建材へと合成されることで、
                        強度と耐久性に優れた素材へと生まれ変わります。
                    </p>

                        <span>2</span>

                    </div>

                    <div class="material-step active">
                        <span>3</span>
                        <p>合成</p>
                    </div>

                    <div class="material-step">
                        <span>4</span>
                        <p>加工</p>
                    </div>

                </div>

                <article class="material-card">

                    <p class="material-count">STEP 3</p>

                    <h2>合成</h2>

                    <figure class="material-figure">
                        <img src="images/material_03.jpg" alt="特殊素材を建材へ合成するイラスト">
                        <figcaption>
                           
                        </figcaption>
                    </figure>

                    <p>
                        分離した素材は、専用設備を使用して木材や鉄筋へと合成されます。
                    </p>

                    <p>
                        特殊素材を混ぜ合わせることで、
                        より丈夫で長持ちする建材へと生まれ変わります。
                    </p>

                    <p>
                        宮真倉リフォームでは、
                        長年培った独自技術によって高品質な特殊建材を製造しています。
                    </p>

                    <p>
                        毎日の暮らしを支えるため、
                        品質管理も徹底して行っています。
                    </p>

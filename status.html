<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>処置状況確認</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark.css">
</head>

<body class="dark-page" data-page="21">

    <div id="header"></div>

    <main>

        <section class="dark-main">
            <div class="container">

                <article class="dark-card">

                    <span class="dark-label">
                        内部管理資料
                    </span>

                    <h1>処置状況確認</h1>

                    <p class="dark-date">
                        最終更新：2023年4月
                    </p>

                    <h2>現在の制作状況</h2>

                    <div class="progress-box">

                        <div class="progress-header">
                            <span>進捗率</span>
                            <strong>80%</strong>
                        </div>

                        <div class="progress-bar">
                            <div class="progress-fill"></div>
                        </div>

                    </div>

                    <div class="dark-note">

                        <p>
                            現在の制作状況は <strong>80%</strong>。
                        </p>

                        <p>
                            完成まであと少し。
                            必要な素材が不足している。
                        </p>

                        <p>
                            重複する素材も多くなってきた。
                        </p>

                        <p>
                            重複素材については分離後、
                            素材として再利用すること。
                        </p>

                        <p>
                            素材の輸送に関しては、
                            加工部員輸送課へ引き渡すこと。
                        </p>

                    </div>

                </article>

            </div>
        </section>

    </main>

    <div id="footer"></div>

    <script src="include.js"></script>
    <script src="search.js"></script>

</body>
</html>

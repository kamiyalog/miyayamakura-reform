<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>森高 宵｜回答</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/answer.css">
</head>

<body data-page="25">

    <div id="header"></div>

    <main>

        <section class="answer-main">
            <div class="container">

                <article class="mail-box">

                    <div class="mail-title">
                        受信メール
                    </div>

                    <dl class="mail-meta">
                        <div>
                            <dt>件名</dt>
                            <dd>【調査依頼】宮真倉リフォームについて</dd>
                        </div>

                        <div>
                            <dt>差出人</dt>
                            <dd>森高 宵</dd>
                        </div>

                        <div>
                            <dt>メール</dt>
                            <dd>■■■■■■@■■■■.jp</dd>
                        </div>

                        <div>
                            <dt>宛先</dt>
                            <dd>■■■■■■@■■■■.jp</dd>
                        </div>

                        <div>
                            <dt>日時</dt>
                            <dd>2026年6月　18:42</dd>
                        </div>
                    </dl>

                    <div class="mail-body">
                        <p>やぁ。</p>

                        <p>
                            連絡をくれたということは、このサイトの謎が判明したのかな？
                        </p>

                        <p>
                            私もサイトを見てみたんだけど、ちょっと答え合わせをしたくてね。
                        </p>

                        <p>
                            良かったら分かったことを、教えてくれないかい？
                        </p>
                    </div>

                </article>

                <form id="answerForm" class="answer-form">

                    <h2>返信内容</h2>

                    <div class="question">
                        <label for="q1">
                            ミヤマクラ リフォームの前社長の名前は？
                        </label>
                        <input type="text" id="q1" placeholder="入力例：〇〇〇〇〇">
                    </div>

                    <div class="question">
                        <label for="q2">
                            ミヤマクラリフォームから消えた部とは？
                        </label>
                        <input type="text" id="q2" placeholder="入力例：〇〇〇">
                    </div>

                    <div class="question">
                        <label for="q3">
                            宮真倉礼子の旧姓は？
                        </label>
                        <input type="text" id="q3" placeholder="入力例：〇〇">
                    </div>

                    <div class="question">
                        <label for="q4">
                            宮真倉礼子の娘の名前は？
                        </label>
                        <input type="text" id="q4" placeholder="入力例：〇〇〇〇〇">
                    </div>

                    <div class="question">
                        <label for="q5">
                            宮真倉礼子は何を作ろうとしていた？
                        </label>
                        <input type="text" id="q5" placeholder="入力例：〇〇の〇〇〇">
                    </div>

                    <div class="submit-area">
                        <button type="submit" class="answer-button">
                            返信する
                        </button>
                    </div>

                </form>

            </div>
        </section>

        <div id="checkingOverlay" class="checking-overlay">
            <p>回答を確認しています……</p>
        </div>

    </main>

    <div id="footer"></div>

    <script src="include.js"></script>
    <script src="search.js"></script>
    <script src="answer.js"></script>

</body>
</html>

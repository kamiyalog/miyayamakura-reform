<body data-page="18">

    <div id="header"></div>

    <main>

        <section class="profile-main">
            <div class="container">

                <article class="profile-card">

                    <h1>大内 元義</h1>

                    <p class="profile-sub">
                        九木城温泉　三代目
                    </p>

                    <div class="profile-message">

                        <h2>略歴</h2>

                        <table class="internal-table">

                            <tr>
                                <th>1951年</th>
                                <td>九木城温泉 二代目の子息として生まれる。</td>
                            </tr>

                            <tr>
                                <th>1971年</th>
                                <td>九木城温泉にて、フロント業務を中心に業務</td>
                            </tr>

                            <tr>
                                <th>1977年</th>
                                <td>第一子 礼子を授かる。</td>
                            </tr>

                            <tr>
                                <th>1983年</th>
                                <td>三代目館主に就任。</td>
                            </tr>

                            <tr>
                                <th>現在</th>
                                <td>九木城温泉の運営に携わる。</td>
                            </tr>

                        </table>

                        <h2>ごあいさつ</h2>

                        <p>
                            九木城温泉は、
                            地域の皆様に支えられながら今日まで歩んでまいりました。
                        </p>

                        <p>
                            温泉を通じて、
                            多くのお客様に安らぎの時間を提供できるよう、
                            従業員一同努力を続けております。
                        </p>

                        <p>
                            今後とも九木城温泉をよろしくお願いいたします。
                        </p>

                    </div>

                </article>

            </div>
        </section>
